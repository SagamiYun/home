<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sagamiyun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505; --card:#0d0d0d; --border:#222; --border-h:#444;
    --txt:#f0f0f0; --sec:#888; --muted:#555; --accent:#a78bfa;
    --mono:'JetBrains Mono','Fira Code','Courier New',monospace;
    --disp:'Space Grotesk','Inter',sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--bg); color:var(--txt); min-height:100%; }
  /* scanline overlay (Kenosis cinematic vibe) */
  body::before{ content:""; position:fixed; inset:0; pointer-events:none; z-index:2;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 2px, transparent 2px 4px);
    mix-blend-mode:overlay; }
  body::after{ content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
    background:radial-gradient(ellipse at 50% 0%, rgba(167,139,250,.06), transparent 60%); }
  main{ position:relative; z-index:3; max-width:600px; margin-inline:auto; padding:16vh 28px 12vh; }
  .kicker{ font-family:var(--mono); font-size:.7rem; letter-spacing:.45em; text-transform:uppercase;
    color:var(--muted); margin-bottom:1.1rem; }
  .name{ font-family:var(--disp); font-weight:700; font-size:2.9rem; letter-spacing:.02em;
    color:#fff; text-shadow:0 0 30px rgba(255,255,255,.08); margin-bottom:.5rem; }
  .tagline{ font-family:var(--mono); font-weight:300; font-size:.85rem; letter-spacing:.22em;
    text-transform:uppercase; color:var(--accent); text-shadow:0 0 18px rgba(167,139,250,.35);
    margin-bottom:3.2rem; }
  nav{ display:flex; flex-direction:column; gap:.55rem; }
  a.link{ display:grid; grid-template-columns:1.2rem 9.5rem 1fr; align-items:baseline; gap:.7rem;
    text-decoration:none; color:var(--txt); font-family:var(--mono);
    border:1px solid var(--border); border-radius:8px; padding:.85rem 1rem;
    background:var(--card); transition:all 150ms cubic-bezier(.4,0,.2,1); }
  a.link:hover{ border-color:var(--border-h); transform:translateX(3px);
    box-shadow:0 0 24px rgba(167,139,250,.10); }
  a.link .mark{ color:var(--muted); }
  a.link:hover .mark{ color:var(--accent); }
  a.link .gr{ font-weight:600; letter-spacing:.12em; font-size:1.02rem; }
  a.link:hover .gr{ color:var(--accent); text-shadow:0 0 16px rgba(167,139,250,.4); }
  a.link .en{ margin-left:auto; color:var(--sec); font-size:.78rem; letter-spacing:.05em;
    text-transform:uppercase; }
  footer{ position:relative; z-index:3; font-family:var(--mono); font-size:.72rem; letter-spacing:.25em;
    text-transform:uppercase; color:var(--muted); margin-top:3.4rem; }
  @media(max-width:480px){ a.link{ grid-template-columns:1.2rem 1fr; } a.link .en{ display:none; } }
</style>
</head>
<body>
<main>
  <div class="kicker">[+] @SagamiYun // index</div>
  <h1 class="name">Kit Kyo</h1>
  <div class="tagline">edge &amp; on-prem AI infra · Tokyo</div>

  <nav>
    <a class="link" href="https://sagamiyun.me/blog"><span class="mark">&gt;</span><span class="gr">ΛΟΓΟΣ</span><span class="en">Blog · writing</span></a>
    <a class="link" href="https://slark.sagamiyun.me"><span class="mark">&gt;</span><span class="gr">ΑΓΟΡΑ</span><span class="en">Slark · AI team OS</span></a>
    <a class="link" href="https://resume.sagamiyun.me"><span class="mark">&gt;</span><span class="gr">ΒΙΟΣ</span><span class="en">Résumé · CV</span></a>
    <a class="link" href="https://github.com/SagamiYun"><span class="mark">&gt;</span><span class="gr">ΕΡΓΑ</span><span class="en">GitHub · @SagamiYun</span></a>
    <a class="link" href="https://github.com/a2o-labs"><span class="mark">&gt;</span><span class="gr">ΕΡΓΑΣΤΗΡΙΟΝ</span><span class="en">A2O Labs · research</span></a>
    <a class="link" href="mailto:me@sagamiyun.me"><span class="mark">&gt;</span><span class="gr">ΕΡΜΗΣ</span><span class="en">me@sagamiyun.me</span></a>
  </nav>

  <footer>// κένωσις · <span id="y"></span> sagamiyun</footer>
</main>
<script>document.getElementById('y').textContent=new Date().getFullYear();</script>
</body>
</html>
